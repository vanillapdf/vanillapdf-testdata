name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write      # Sigstore keyless signing for provenance
  attestations: write  # record the attestation against the repo

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.14'

      # A release must not ship a corpus the manifest disagrees with, nor a tag
      # whose major disagrees with the manifest schema generation.
      - name: Validate manifest
        run: python scripts/validate_manifest.py --strict --release-tag "${{ github.ref_name }}"

      - name: Build archives
        run: python scripts/build_release.py --summary "$GITHUB_STEP_SUMMARY"

      # Cross-platform reproducibility does not hold (zlib-build dependent), so
      # signed provenance is the origin proof consumers otherwise lack.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: |
            dist/corpus.tar.gz
            dist/broken.tar.gz
            dist/analysis.tar.gz
            dist/manifest.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --notes-file - \
            dist/corpus.tar.gz dist/broken.tar.gz dist/analysis.tar.gz \
            dist/manifest.json dist/SHA256SUMS <<'NOTES'
          Test fixtures for Vanilla.PDF.

          `corpus.tar.gz` is the only asset the core build needs.
          `broken.tar.gz` and `analysis.tar.gz` hold fixtures that are never
          executed by CI — fetch them when investigating parser failures.

          `manifest.json` is the contract: it enumerates every fixture with its
          category, passwords, skip flags and SHA256. Use it to enumerate tests
          rather than globbing. It also ships inside each archive, so an
          extracted corpus always carries the file describing it.

          Verify with `sha256sum -c SHA256SUMS`, and pin the hash via
          `FetchContent_Declare(... URL_HASH SHA256=...)` so a corpus change
          can never silently alter downstream test results.

          Provenance is attested. Confirm an asset came from this repo's release
          workflow with:
          `gh attestation verify corpus.tar.gz --repo ${{ github.repository }}`

          Note that `.tar.gz` hashes are reproducible per zlib build, not across
          platforms — a local rebuild may differ. Per-fixture SHA256 in the
          manifest is the portable integrity check.

          Licensing is per-file and partly unresolved — see `SOURCES.md`.
          NOTES
